# DecapCMS config — uses DecapBridge PKCE auth (Netlify Identity was deprecated 2025)
# Register at https://decapbridge.com to get your site-specific auth endpoints,
# then replace the placeholder UUIDs below.

backend:
  name: git-gateway
  repo: taraxvoid/soundry
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/1833423d-6ad8-4385-bb6f-b5d6f14d4661/pkce
  auth_token_endpoint: /sites/1833423d-6ad8-4385-bb6f-b5d6f14d4661/token
  gateway_url: https://gateway.decapbridge.com

publish_mode: editorial_workflow
logo_url: https://soundryomaha.org/images/logo.png
media_folder: public/images/uploads
public_folder: /images/uploads

site_url: https://soundryomaha.org

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email

# Enable for local testing: bunx decap-server
local_backend: true

commit_messages:
  create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}>'
  update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}>'
  delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}>'
  uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}>'
  deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}>'

collections:
  - name: events
    label: Events
    folder: src/content/events
    create: true
    delete: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    extension: yaml
    format: yaml
    fields:
      - { name: title, label: Title, widget: string }
      - name: date
        label: Date
        widget: datetime
        format: 'YYYY-MM-DD'
        date_format: 'YYYY-MM-DD'
        time_format: false
      - {
          name: time,
          label: Start Time,
          widget: string,
          hint: '24h format, e.g. 18:00',
        }
      - {
          name: endTime,
          label: End Time,
          widget: string,
          required: false,
          hint: '24h format, e.g. 19:30 — defaults to 90 min after start if omitted',
        }
      - { name: location, label: Location, widget: string }
      - { name: description, label: Description, widget: text }
      - {
          name: price,
          label: Price,
          widget: string,
          required: false,
          hint: 'Use 0 for free events',
          default: '0',
        }
      - { name: image, label: Event Image, widget: image, required: false }
      - {
          name: rsvpLink,
          label: RSVP / More Info URL,
          widget: string,
          required: false,
        }
